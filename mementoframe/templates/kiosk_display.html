<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="{{ url_for('static', filename='kiosk_display.css') }}">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>

<title>MementoFrame MainPage</title>

<body>
<div id="mf-update-overlay" class="mf-update-overlay" aria-hidden="true">
  <div class="mf-loading__inner">
    <div class="mf-loading__logo" aria-hidden="true">
      <div class="mf-loading__frame mf-loading__frame--back"></div>
      <div class="mf-loading__frame mf-loading__frame--mid"></div>
      <div class="mf-loading__frame mf-loading__frame--front"></div>
      <div class="mf-loading__dot mf-loading__dot--lg"></div>
      <div class="mf-loading__dot mf-loading__dot--sm"></div>
    </div>

    <div class="mf-loading__wordmark">
      <span>UPDATING</span>
      <span>FRAME</span>
    </div>
  </div>

  <div class="mf-loading__footer">
    <div class="mf-loading__status" id="updateStatusText">Applying software update</div>
    <div class="mf-loading__progress" aria-hidden="true"></div>
    <div class="mf-update-overlay__hint">The frame may restart automatically when the update finishes.</div>
  </div>
</div>

<div id="loading-screen" class="mf-loading">
  <div class="mf-loading__inner">
    <div class="mf-loading__logo" aria-hidden="true">
      <div class="mf-loading__frame mf-loading__frame--back"></div>
      <div class="mf-loading__frame mf-loading__frame--mid"></div>
      <div class="mf-loading__frame mf-loading__frame--front"></div>
      <div class="mf-loading__dot mf-loading__dot--lg"></div>
      <div class="mf-loading__dot mf-loading__dot--sm"></div>
    </div>

    <div class="mf-loading__wordmark">
      <span>MEMENTO</span>
      <span>FRAME</span>
    </div>
  </div>

  <div class="mf-loading__footer">
    <!-- <div class="mf-loading__status" id="statusText">Loading display</div> -->
    <div class="mf-loading__progress" aria-hidden="true"></div>
    <div class="mf-loading__versions" id="versions">
      <span> </span>
      <span></span>
      <span></span>
      <span></span>
    </div>
  </div>
</div>

  <div class="background">
    <div class="left_panel">
      <div id="photo" class="photo"></div>
    </div>
  </div>

  <div class="right_panel">
    <div class="first-row">
      <div class="dual_clock-box">
        <div class="clock-box clock-box-left">
          <div id="clock" class="clock">10:32</div>
          <div class="region">Chengdu, China</div>
        </div>
        <div class="clock-box clock-box-right">
          <div id="clock2" class="clock">10:32</div>
          <div class="region">Chengdu, China</div>
        </div>
      </div>
    </div>

    <div class="double_box second_row">
      <div class="rounded-box date-box">
        <div id="day-number" class="day">2</div>
        <div id="month-year" class="month-year">09, 2026</div>
      </div>
      <div class="rounded-box weather-box">
        <div class="weather-icon">
          <img id="weather-icon" src="/assets/Icons/nocloud.svg" alt="Weather Icon" />
        </div>
        <div class="weather-info">
          <div class="weather-temperature">25°C</div>
          <div class="weather-condition">Sunny</div>
        </div>
      </div>
    </div>

    <div id="spotify-box" class="rounded-box spotify-box hidden"
      style="opacity: 1; transition: opacity 1s, transform 0.5s">
      <div class="album-art">
        <img id="album-cover" src="/assets/Icons/album.webp" alt="Album Art" />
        <div id="track-liked" class="like-icon">
          <img src="assets/Icons/heart.svg" alt="Liked Song" />
        </div>
      </div>

      <div class="track-info">
        <div class="track-name-wrapper">
          <div id="track-name" class="track-name">Track Name</div>
          <div id="track-artist" class="track-artist">Artist Name</div>
        </div>

        <div class="playback-row">
          <div id="track-status" class="play_pause-icon"></div>
          <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="calendar-box" class="rounded-box calendar-box visible">
      <div id="calendar"></div>
    </div>

    <div class="system-info-box">
      <div class="wifi-info">
        <div class="wifistatus" id="wifi-status">
          <img id="wifi-icon" src="/assets/Icons/wifi.svg" alt="WiFi Status" />
        </div>
      </div>
      <div id="update-status-card" class="rounded-box update-status-card hidden" title="Software update available">
        <svg class="update-status-card__icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M12 3v10.2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
          <path d="M7.8 9.2 12 13.4l4.2-4.2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M5 16.5v1.2A2.3 2.3 0 0 0 7.3 20h9.4a2.3 2.3 0 0 0 2.3-2.3v-1.2" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
        </svg>
        <div class="update-status-card__text">UPDATE</div>
      </div>
      <div class="rounded-box qrcode_icon">
        <img src="resources/qrcode.png" alt="QR Code Icon" />
      </div>
    </div>
  </div>
</body>
<script src="/assets/qrcode.min.js"></script>
<script src="/userdata/Photos/photos.js"></script>
<script type="module" src="/static/js/main.js"></script>

</html>
